appId: com.neo-tts.desktop
productName: NeoTTS
directories:
  output: release/${version}
asar: true
files:
  - dist/**/*
extraResources:
  - from: .stage/app-runtime
    to: app-runtime
    filter:
      - "**/*"
  - from: .stage/manifest-lock.json
    to: manifest-lock.json
win:
  icon: ../frontend/public/512.ico
  target:
    - target: dir
      arch:
        - x64
